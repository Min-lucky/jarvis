# config/settings.yaml

# Audio settings
sample_rate: 44100          # Hz
chunk_size: 1024           # frames per read
voice_wake_threshold: 0.001 # start listening when mic level crosses this threshold

# Permission settings
permissions_file: "config/permissions.json"

# MCP settings
mcp_endpoint: "http://127.0.0.1:11434/v1/chat/completions"  # Ollama OpenAI-compatible endpoint
llm_model: "minicpm-v"                                       # ollama run minicpm-v
use_gpu: true

# STT/TTS selection (choose one)
# STT/TTS selection
stt_backend: "real"          # options: placeholder (type in console), real (voice recognition)
tts_backend: "coqui"         # options: coqui, edge_tts (Currently uses pyttsx3 by default)
