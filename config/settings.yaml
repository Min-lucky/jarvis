# config/settings.yaml

# Audio settings
sample_rate: 44100          # Hz
chunk_size: 1024           # frames per read
clap_threshold: 0.3        # lowered for better sensitivity
clap_max_interval: 1.5     # slightly more time for double clap

# Permission settings
permissions_file: "config/permissions.json"

# MCP settings
mcp_endpoint: "http://127.0.0.1:5000/v1/chat/completions"  # local LLM server endpoint
use_gpu: true

# STT/TTS selection (choose one)
# STT/TTS selection
stt_backend: "placeholder"   # options: placeholder (type in console), real (voice recognition)
tts_backend: "coqui"         # options: coqui, edge_tts (Currently uses pyttsx3 by default)
